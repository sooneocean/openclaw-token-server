services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: openclaw_token_dev
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 10

  server:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/openclaw_token_dev
      PORT: "3000"
      UPSTREAM_API_KEY: ${UPSTREAM_API_KEY:-}
      UPSTREAM_API_BASE: ${UPSTREAM_API_BASE:-https://api.openai.com}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:-}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
